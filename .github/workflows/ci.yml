name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-glob: "pyproject.toml"
      - run: pip install ruff
      - name: Check linting
        run: ruff check src/ tests/ experiments/
      - name: Check formatting
        run: ruff format --check src/ tests/ experiments/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-glob: "pyproject.toml"
      - name: Install dependencies
        run: pip install -e ".[dev]" && pip install mypy
      - name: Run mypy
        run: >
          mypy
          src/qvartools/pipeline.py
          src/qvartools/pipeline_config.py
          src/qvartools/nqs/
          src/qvartools/solvers/solver.py
          --ignore-missing-imports
          --no-error-summary

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-glob: "pyproject.toml"
      - name: Install package
        run: pip install -e ".[dev,pyscf]"
      - name: Import smoke test
        run: |
          python - <<'PY'
          from qvartools.molecules import list_molecules
          mols = list_molecules()
          assert len(mols) >= 24, f"Expected >=24 molecules, got {len(mols)}"
          print(f"OK: {len(mols)} molecules registered")
          PY
      - name: Import all public modules
        run: |
          python - <<'PY'
          import qvartools
          from qvartools.pipeline import FlowGuidedKrylovPipeline
          from qvartools.solvers import FCISolver, SolverResult
          from qvartools.methods.nqs import run_hi_nqs_sqd, run_hi_nqs_skqd
          print("All imports OK")
          PY

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-glob: "pyproject.toml"
      - name: Install dependencies
        run: pip install -e ".[dev,pyscf]"
      - name: Run tests with coverage
        if: matrix.python-version == '3.11'
        run: >
          pytest
          --cov=qvartools
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=40
          -m "not gpu"
          --tb=short -q
      - name: Run tests
        if: matrix.python-version != '3.11'
        run: >
          pytest
          -m "not gpu"
          --tb=short -q

  docs:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-glob: "pyproject.toml"
      - name: Install docs dependencies
        run: pip install -e ".[docs]"
      - name: Build Sphinx docs
        continue-on-error: true
        run: python -m sphinx docs/source docs/build/html -q -W --keep-going
