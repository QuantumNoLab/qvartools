# 001_dci: Direct-CI (HF + singles + doubles) pipelines
# No NF training. Basis generated deterministically.

molecule: h2

# Krylov parameters (for classical and quantum variants)
max_krylov_dim: 10
shots_per_krylov: 100000

# Quantum Krylov parameters
total_evolution_time: 3.14159265
num_trotter_steps: 1
trotter_order: 2
shots: 100000
backend: auto

# SQD parameters
sqd_noise_rate: 0.03
sqd_num_batches: 5
sqd_self_consistent_iters: 5

device: auto
