# 006_iterative_nqs: Iterative NQS with eigenvector feedback pipelines

molecule: h2

# Iterative NQS parameters
max_iterations: 10
n_samples_per_iter: 5000
nqs_train_epochs: 30
krylov_max_new: 200
krylov_n_ref: 5

# Quantum Krylov parameters (for quantum variant)
total_evolution_time: 3.14159265
num_trotter_steps: 1
trotter_order: 2
shots: 100000
backend: auto
nqs_warmup_iters: 3

device: auto
