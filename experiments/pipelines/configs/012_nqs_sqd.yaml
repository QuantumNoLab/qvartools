# 012_nqs_sqd: NQS+SQD method (two-stage, no iteration)
#
# Single-section YAML. Defaults are tuned for H2 smoke testing.

default:
  molecule: h2
  device: auto
  n_samples: 2000
  nqs_train_epochs: 100
  nqs_lr: 1.0e-3
  embed_dim: 64
  n_heads: 4
  n_layers: 4
  temperature: 1.0
  max_basis_size: 5000
