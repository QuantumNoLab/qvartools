# 004_nf_only: NF-only pipelines (ablation, no DCI merge)

molecule: h2

# NF training parameters
teacher_weight: 0.5
physics_weight: 0.4
entropy_weight: 0.1
max_epochs: 150
min_epochs: 50
samples_per_batch: 1000

# Krylov parameters
max_krylov_dim: 10
shots_per_krylov: 100000

# Quantum Krylov parameters
total_evolution_time: 3.14159265
num_trotter_steps: 1
trotter_order: 2
shots: 100000
backend: auto

# SQD parameters
sqd_noise_rate: 0.03
sqd_num_batches: 5
sqd_self_consistent_iters: 5

device: auto
